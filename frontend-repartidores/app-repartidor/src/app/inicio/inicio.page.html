<ion-content [fullscreen]="true" class="inicio-content">

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="assets/logo.png" alt="logo">
    </div>

    <!-- BOTONES -->
    <div class="botones">
      <ion-button expand="block" routerLink="/login" color="primary">
        Iniciar sesión
      </ion-button>

      <ion-button expand="block" routerLink="/register" fill="outline" class="btn-outline">
        Crear una cuenta
      </ion-button>
    </div>

  </div>

</ion-content>
